{% extends 'base.html' %}

{% block content %}
<style>
    .cpp-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .neon-cpp-card {
        width: 100%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        text-align: center;
    }

    .chip-icon-box {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #00599C, #004482);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        box-shadow: 0 0 25px rgba(0, 89, 156, 0.5);
        font-size: 30px;
        color: white;
    }

    .neon-title {
        font-size: 28px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 10px;
        letter-spacing: -0.5px;
    }

    .neon-input-group {
        display: flex;
        gap: 10px;
        margin: 30px 0;
    }

    .neon-field {
        flex: 1;
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 12px;
        padding: 12px 20px;
        color: #fff !important;
        outline: none;
        transition: 0.3s;
    }

    .neon-field:focus {
        border-color: #00599C !important;
        box-shadow: 0 0 15px rgba(0, 89, 156, 0.3);
    }

    .btn-neon-calc {
        padding: 12px 25px;
        background: linear-gradient(90deg, #00599C, #008cff);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0, 89, 156, 0.4);
    }

    .btn-neon-calc:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 89, 156, 0.6);
    }

    /* Terminal ko'rinishidagi natija qutisi */
    #resultBox {
        display: none;
        background: #0d1117;
        border: 1px solid #30363d;
        border-left: 4px solid #238636;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
        text-align: left;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 14px;
        color: #d1d5db;
        animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="cpp-wrapper">
    <div class="neon-cpp-card">
        <div class="chip-icon-box">
            <i class="fas fa-microchip"></i>
        </div>

        <h2 class="neon-title">C++ Integratsiyasi</h2>
        <p class="text-muted small">Serverda C++ kodini ishga tushiring va natijani oling.</p>

        <form id="calcForm" class="neon-input-group">
            {% csrf_token %}
            <input type="number" id="numberInput" name="input" class="neon-field" placeholder="Son kiriting (masalan: 5)" required>

            <button type="submit" id="submitBtn" class="btn-neon-calc">
                Hisoblash
            </button>
        </form>

        <div id="resultBox">
            <div style="color: #8b949e; margin-bottom: 5px; font-size: 11px;">$ OUTPUT:</div>
            <span id="outputText"></span>
        </div>

        <div class="mt-4">
            <a href="{% url 'home' %}" class="text-muted text-decoration-none small hover-white">
                <i class="fas fa-arrow-left me-1"></i> Bosh sahifaga qaytish
            </a>
        </div>
    </div>
</div>

<script>
    document.getElementById('calcForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const btn = document.getElementById('submitBtn');
        const inputVal = document.getElementById('numberInput').value;
        const resultBox = document.getElementById('resultBox');
        const outputText = document.getElementById('outputText');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        // C++ kodi orqa fonda
        const cppCode = `#include <iostream>
using namespace std;

int main() {
    int n;
    if (cin >> n) {
        cout << "Kiritilgan son: " << n << endl;
        cout << "Natija (kvadrati): " << n * n << endl;
        cout << "--------------------------" << endl;
        cout << "Muvaffaqiyatli bajarildi.";
    } else {
        cout << "Xatolik: Noto'g'ri qiymat.";
    }
    return 0;
}`;

        const formData = new FormData();
        formData.append('code', cppCode);
        formData.append('input', inputVal);

        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        fetch("{% url 'cpp_test' %}", {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': csrfToken
            }
        })
        .then(response => response.json())
        .then(data => {
            resultBox.style.display = 'block';
            resultBox.style.borderLeftColor = '#238636';
            outputText.innerText = data.result;
        })
        .catch(error => {
            resultBox.style.display = 'block';
            resultBox.style.borderLeftColor = '#f85149';
            outputText.innerText = "Server bilan aloqa uzildi.";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = 'Hisoblash';
        });
    });
</script>
{% endblock %}

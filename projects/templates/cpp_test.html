{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card p-5 shadow" style="background-color: #1e1e1e; border: 1px solid var(--border-color);">
            <h2 class="mb-4" style="color: white;">
                <i class="fas fa-microchip text-primary"></i> C++ Integratsiyasi
            </h2>
            <p class="text-muted">Biror son kiriting, biz uni C++ orqali hisoblaymiz.</p>

            <form id="calcForm" class="d-flex gap-2 mb-4">
                {% csrf_token %}
                <input type="number" id="numberInput" name="input" class="form-control" placeholder="Son kiriting..." required
                       style="background: #121212; color: white; border: 1px solid var(--border-color);">

                <button type="submit" id="submitBtn" class="btn btn-primary">
                    Hisoblash
                </button>
            </form>

            <div id="resultBox" class="alert alert-success fw-bold" style="display: none; white-space: pre-wrap;"></div>

            <a href="{% url 'home' %}" class="btn btn-outline-secondary mt-3">Bosh sahifaga qaytish</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('calcForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Sahifa qayta yuklanishini to'xtatadi

        const btn = document.getElementById('submitBtn');
        const inputVal = document.getElementById('numberInput').value;
        const resultBox = document.getElementById('resultBox');

        // Tugmani bloklaymiz
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        // Bizning views.py 'code' va 'input' kutadi.
        // Foydalanuvchi faqat 'input' kiritdi.
        // Shuning uchun orqa fonda C++ kodini o'zimiz yuboramiz:
        const cppCode = `#include <iostream>
using namespace std;

int main() {
    int n;
    if (cin >> n) {
        cout << "Kiritilgan sonning kvadrati: " << n * n << endl;
        cout << "Bu hisob C++ orqali bajarildi.";
    } else {
        cout << "Xatolik: Son kiritilmadi.";
    }
    return 0;
}`;

        const formData = new FormData();
        formData.append('code', cppCode);   // Kod
        formData.append('input', inputVal); // Foydalanuvchi kiritgan son

        // CSRF tokenni olish
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        fetch("{% url 'cpp_test' %}", {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': csrfToken
            }
        })
        .then(response => response.json())
        .then(data => {
            // Natijani ko'rsatish
            resultBox.style.display = 'block';
            resultBox.innerText = data.result;
        })
        .catch(error => {
            resultBox.style.display = 'block';
            resultBox.className = 'alert alert-danger fw-bold';
            resultBox.innerText = "Xatolik yuz berdi.";
        })
        .finally(() => {
            // Tugmani joyiga qaytarish
            btn.disabled = false;
            btn.innerHTML = 'Hisoblash';
        });
    });
</script>
{% endblock %}

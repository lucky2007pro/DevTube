{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card p-5 shadow" style="background-color: var(--bg-nav); border: 1px solid var(--border-color);">
            <h2 class="mb-4" style="color: var(--text-main);">
                <i class="fas fa-microchip text-primary"></i> C++ Integratsiyasi
            </h2>
            <p class="text-muted">Bu sahifadagi hisob-kitobni Python emas, <b>C++ (main.exe)</b> bajaradi.</p>
            
            <form method="GET" class="d-flex gap-2 mb-4">
                <input type="number" name="number" class="form-control" placeholder="Biror son kiriting..." required 
                       style="background: var(--search-bg); color: var(--text-main); border: 1px solid var(--border-color);">
                <button type="submit" class="btn btn-primary">Hisoblash</button>
            </form>

            <div class="alert alert-success fw-bold">
                {{ result }}
            </div>
            
            <a href="{% url 'home' %}" class="btn btn-outline-secondary mt-3">Bosh sahifaga qaytish</a>
        </div>
    </div>
</div>
{% endblock %}

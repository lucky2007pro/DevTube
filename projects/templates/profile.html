{% extends 'base.html' %}

{% block content %}
<style>
    /* ... Mavjud barcha CSS qismlari saqlanadi ... */

    /* --- QO'SHIMCHA: CHOOSE FILE TUGMASINI NEON QILISH --- */
    .profile-file-zone {
        position: relative;
        border: 2px dashed rgba(79, 70, 229, 0.3);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        background: rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition: 0.3s;
    }
    .profile-file-zone:hover {
        border-color: #4f46e5;
        background: rgba(79, 70, 229, 0.05);
    }
    /* Standart oq tugmani yashirish */
    .profile-file-zone input[type="file"] {
        position: absolute; width: 100%; height: 100%;
        top: 0; left: 0; opacity: 0; cursor: pointer;
    }

    /* Modal ichidagi inputlarni tahrirlash (Neon style) */
    .modal-neon-field {
        background: rgba(0, 0, 0, 0.4) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 12px;
        color: #fff !important;
        padding: 12px 15px;
        transition: 0.3s;
    }
    .modal-neon-field:focus {
        border-color: #4f46e5 !important;
        box-shadow: 0 0 15px rgba(79, 70, 229, 0.3) !important;
    }
</style>

<div class="modal fade" id="editProfileModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;">
            <div class="modal-header border-0">
                <h5 class="modal-title text-white fw-bold">Profil sozlamalari</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="text-muted small mb-1">FOYDALANUVCHI NOMI</label>
                        {{ u_form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small mb-1">EMAIL MANZIL</label>
                        {{ u_form.email }}
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small mb-1">BIO (QISQA TAVSIF)</label>
                        {{ p_form.bio }}
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small mb-1">PROFIL RASMI</label>
                        <div class="profile-file-zone">
                            <i class="fas fa-camera fa-2x text-primary mb-2"></i>
                            <div class="text-white small fw-bold" id="file-name-text">Yangi rasm tanlang</div>
                            {{ p_form.avatar }}
                        </div>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary fw-bold py-2 rounded-pill" style="background: linear-gradient(90deg, #4f46e5, #7c3aed); border: none;">
                            O'zgarishlarni saqlash
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Modal ichidagi inputlarni avtomatik neon uslubiga o'tkazish
    document.addEventListener("DOMContentLoaded", function() {
        const profileInputs = document.querySelectorAll('#editProfileModal input, #editProfileModal textarea');
        profileInputs.forEach(input => {
            if(input.type !== 'file') {
                input.classList.add('modal-neon-field', 'form-control');
            }
        });

        // Fayl tanlanganda oq tugma yozuvini o'zgartirish
        const avatarInput = document.querySelector('.profile-file-zone input');
        avatarInput.addEventListener('change', function() {
            const fileName = this.files[0] ? this.files[0].name : "Yangi rasm tanlang";
            document.getElementById('file-name-text').innerText = fileName;
            this.parentElement.style.borderColor = "#22c55e";
        });
    });
</script>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-4 shadow-sm">
            <h2 class="text-center mb-4"><i class="fas fa-cloud-upload-alt text-primary"></i> Loyiha Yuklash</h2>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="fw-bold">Sarlavha</label>
                    {{ form.title }}
                </div>
                
                <div class="mb-3">
                    <label class="fw-bold">Tavsif</label>
                    {{ form.description }}
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold">Kategoriya</label>
                        {{ form.category }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold">Narxi ($)</label>
                        {{ form.price }}
                        <small class="text-muted">0 = Tekin</small>
                    </div>
                </div>
                
                <div class="p-3 bg-light border rounded mb-3">
                    <label class="fw-bold text-primary"><i class="fas fa-code"></i> Kod Fayli (Py, Zip, Txt)</label>
                    {{ form.source_code }}
                    <small class="text-danger d-block mt-1">Exe va virusli fayllar bloklanadi!</small>
                </div>
                
                <div class="mb-3">
                    <label class="fw-bold">Video Preview</label>
                    {{ form.video_file }}
                </div>
                
                <div class="mb-3">
                    <label class="fw-bold">Rasm (Thumbnail)</label>
                    {{ form.image }}
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">CHOP ETISH</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Formani chiroyli qilish
    document.querySelectorAll('input, select, textarea').forEach(e => e.classList.add('form-control'));
    document.querySelectorAll('input[type="file"]').forEach(e => e.classList.add('p-2', 'bg-white'));
</script>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card p-5 shadow text-center">
            <h2 class="fw-bold mb-4" style="font-family: sans-serif;">
                <i class="fas fa-code text-primary me-1"></i><i class="fas fa-play text-danger me-2"></i> DevTube
            </h2>
            <h4 class="mb-3">Xush kelibsiz!</h4>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3 text-start">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">KIRISH</button>
            </form>
            
            <p class="mt-3 text-muted">Hali a'zo emasmisiz? <a href="{% url 'register' %}">Ro'yxatdan o'ting</a></p>
        </div>
    </div>
</div>
{% endblock %}

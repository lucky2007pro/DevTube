{% extends 'base.html' %}
{% block content %}
<style>
    .compiler-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 15px;
        backdrop-filter: blur(10px);
    }
    .code-editor {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 14px;
        line-height: 1.6;
        background: rgba(0, 0, 0, 0.3) !important;
        color: #e2e8f0 !important;
        border: none;
        resize: none;
    }
    .code-editor:focus {
        box-shadow: none;
        background: rgba(0, 0, 0, 0.4) !important;
    }
    .output-area {
        font-family: 'Consolas', monospace;
        background: #0f172a;
        color: #10b981;
        border-radius: 0 0 10px 0;
    }
</style>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-11">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-white fw-bold"><i class="fas fa-terminal text-warning me-2"></i> Online Compiler</h2>
                <div class="d-flex gap-2">
                    <span class="badge bg-primary bg-opacity-25 text-primary px-3 py-2 rounded-pill">Multi-Language</span>
                    <span class="badge bg-success bg-opacity-25 text-success px-3 py-2 rounded-pill">Cloud API</span>
                </div>
            </div>

            <div class="compiler-card shadow-lg overflow-hidden">
                <form id="compiler-form" method="post">
                    {% csrf_token %}

                    <div class="p-3 border-bottom border-secondary d-flex gap-3 align-items-center flex-wrap" style="background: rgba(255,255,255,0.02);">
                        <select name="language" id="langSelect" class="form-select bg-dark text-white border-secondary" style="width: 200px;" onchange="fillExample()">
                            {% for lang_code, lang_name in languages %}
                                <option value="{{ lang_code }}" {% if current_lang == lang_code %}selected{% endif %}>{{ lang_name }}</option>
                            {% endfor %}
                        </select>

                        <button type="button" class="btn btn-sm btn-outline-light" onclick="fillExample()">
                            <i class="fas fa-magic me-1"></i> Kod Namunasini Yuklash
                        </button>

                        <button type="submit" class="btn btn-primary px-4 ms-auto fw-bold shadow-lg" id="runBtn">
                            <i class="fas fa-play me-2"></i> Run Code
                        </button>
                    </div>

                    <div class="row g-0">
                        <div class="col-md-8 border-end border-secondary">
                            <textarea name="code" id="codeInput" class="form-control code-editor p-4"
                                style="height: 550px;"
                                placeholder="// Kodingizni shu yerga yozing..." spellcheck="false">{{ code }}</textarea>
                        </div>

                        <div class="col-md-4 d-flex flex-column">
                            <div class="p-2 border-bottom border-secondary bg-dark bg-opacity-50 text-muted small fw-bold text-uppercase px-3">
                                <i class="fas fa-keyboard me-2"></i> Input (Kiruvchi ma'lumot)
                            </div>
                            <textarea name="input" class="form-control bg-transparent text-white border-0 p-3"
                                style="height: 150px; font-family: monospace; resize: none; border-bottom: 1px solid rgba(255,255,255,0.1) !important;"
                                placeholder="Masalan: 10 20">{{ input }}</textarea>

                            <div class="p-2 border-bottom border-secondary bg-dark bg-opacity-50 text-muted small fw-bold text-uppercase px-3">
                                <i class="fas fa-desktop me-2"></i> Output (Natija)
                            </div>
                            <pre id="outputArea" class="p-3 mb-0 flex-grow-1 output-area" style="overflow: auto; white-space: pre-wrap;">{{ result }}</pre>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
    // 1. AJAX So'rov (Sahifa yangilanmasligi uchun)
    document.getElementById('compiler-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('runBtn');
        const output = document.getElementById('outputArea');
        const originalText = btn.innerHTML;

        // Yuklash holati
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Compiling...';
        output.innerText = 'Serverga ulanmoqda...';
        output.style.color = '#94a3b8';

        const formData = new FormData(this);

        fetch(window.location.href, {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.json())
        .then(data => {
            output.innerText = data.result;

            // Xatolik bo'lsa qizil rang, bo'lmasa yashil
            if (data.result.toLowerCase().includes('error') || data.result.toLowerCase().includes('traceback') || data.result.toLowerCase().includes('exception')) {
                output.style.color = '#ef4444'; // Qizil
            } else {
                output.style.color = '#10b981'; // Yashil
            }

            btn.disabled = false;
            btn.innerHTML = originalText;
        })
        .catch(err => {
            output.innerText = "Internet bilan aloqa yo'q yoki Server xatosi.";
            output.style.color = '#ef4444';
            btn.disabled = false;
            btn.innerHTML = originalText;
        });
    });

    // 2. Tab tugmasini bosganda 4 ta probel tashlash
    document.getElementById('codeInput').addEventListener('keydown', function(e) {
        if (e.key == 'Tab') {
            e.preventDefault();
            var start = this.selectionStart;
            var end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
        }
    });

    // 3. Tillar uchun tayyor namunalar
    const examples = {
        'python': 'print("Salom, DevTube!")\n\n# Massiv bilan ishlash\nnumbers = [1, 2, 3, 4, 5]\nkvadratlar = [n**2 for n in numbers]\nprint(f"Kvadratlar: {kvadratlar}")',
        'javascript': 'console.log("Salom, JavaScript!");\n\nconst users = [\n  { name: "Ali", age: 25 },\n  { name: "Vali", age: 30 }\n];\n\nusers.forEach(user => {\n  console.log(`${user.name} - ${user.age} yosh`);\n});',
        'cpp': '#include <iostream>\n#include <vector>\nusing namespace std;\n\nint main() {\n    cout << "Salom, C++!" << endl;\n    \n    vector<int> nums = {10, 20, 30};\n    for(int n : nums) {\n        cout << n << " ";\n    }\n    return 0;\n}',
        'java': 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Salom, Java!");\n        \n        for(int i=1; i<=5; i++) {\n            System.out.println("Sanoq: " + i);\n        }\n    }\n}',
        'go': 'package main\nimport "fmt"\n\nfunc main() {\n    fmt.Println("Salom, Go Lang!")\n    \n    arr := []int{2, 4, 6, 8}\n    fmt.Println(arr)\n}',
        'php': '<?php\necho "Salom, PHP!\\n";\n\n$colors = ["Red", "Green", "Blue"];\nforeach ($colors as $color) {\n    echo "$color\\n";\n}\n?>',
        'csharp': 'using System;\n\npublic class Program\n{\n    public static void Main()\n    {\n        Console.WriteLine("Salom, C#!");\n    }\n}',
        'ruby': 'puts "Salom, Ruby!"\n\n5.times do |i|\n  puts "Sanoq: #{i}"\nend'
    };

    function fillExample() {
        const lang = document.getElementById('langSelect').value;
        const editor = document.getElementById('codeInput');

        if (examples[lang]) {
            editor.value = examples[lang];
        } else {
            editor.value = '// Bu til uchun namuna hozircha mavjud emas';
        }
    }

    // Sahifa yuklanganda birinchi marta Python namunasini qo'yish
    window.onload = function() {
        if(document.getElementById('codeInput').value.trim() === "") {
            fillExample();
        }
    };
</script>
{% endblock %}
